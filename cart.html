<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Bentre Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <div class="logo"><h1><i class="fas fa-bolt"></i> BENTRE HUB</h1></div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Shop</a></li>
                    <li><a href="cart.html" class="active">Cart</a></li>
                    <li><a href="account.html">Account</a></li>
                </ul>
                <div class="nav-icons"><i class="fas fa-shopping-cart" id="cartIcon"><span id="cartCount">0</span></i></div>
            </div>
        </div>
    </header>

    <div class="container cart-page">
        <h2>Your Shopping Cart</h2>
        <div id="cartItemsContainer" class="cart-items-list"></div>
        <div class="cart-summary" id="cartSummary" style="display:none;">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="cartSubtotal">Ksh 0</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee:</span>
                <span id="deliveryFee">Ksh 0</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="cartTotal">Ksh 0</span>
            </div>
            <button class="btn-gold btn-checkout" id="checkoutBtn">Proceed to Checkout</button>
        </div>
        <div id="emptyCartMsg" class="empty-cart" style="display:none;">
            <i class="fas fa-shopping-cart"></i>
            <p>Your cart is empty</p>
            <a href="products.html" class="btn-outline-gold">Continue Shopping</a>
        </div>
    </div>

    <footer><div class="container">© 2025 Bentre Hub — M-Pesa, Visa, Mastercard accepted</div></footer>
    <script src="script.js"></script>
</body>
</html>
