<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | Bentre Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <header>
        <div class="container">
            <div class="navbar">
                <div class="logo"><h1><i class="fas fa-bolt"></i> BENTRE HUB</h1><p class="tagline">Budget Electronics</p></div>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html" class="active">Shop</a></li>
                    <li><a href="cart.html">Cart</a></li>
                    <li><a href="account.html">Account</a></li>
                </ul>
                <div class="nav-icons"><i class="fas fa-shopping-cart" id="cartIcon"><span id="cartCount">0</span></i></div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="filters-section">
            <div class="filters-bar">
                <div class="filter-group">
                    <label><i class="fas fa-filter"></i> Category</label>
                    <select id="categoryFilter">
                        <option value="all">All Categories</option>
                        <option value="smartphones">Smartphones</option>
                        <option value="audio">Audio</option>
                        <option value="wearables">Wearables</option>
                        <option value="gadgets">Gadgets</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-sort"></i> Sort by</label>
                    <select id="sortFilter">
                        <option value="default">Featured</option>
                        <option value="priceLow">Price: Low to High</option>
                        <option value="priceHigh">Price: High to Low</option>
                        <option value="rating">Top Rated</option>
                    </select>
                </div>
                <div class="filter-group search-group">
                    <label><i class="fas fa-search"></i> Search</label>
                    <input type="text" id="searchInput" placeholder="Search products...">
                </div>
            </div>
            <div class="active-filters" id="activeFilters"></div>
        </div>
        <div class="product-grid" id="allProductsGrid"></div>
        <div id="noResults" class="no-results" style="display:none; text-align:center; padding:3rem;">😞 No products found. Try different filters!</div>
    </div>

    <footer>
        <div class="container footer-content">
            <div><h3>Bentre Hub</h3><p>📍 Nairobi, Kenya | 📞 +254 712 345 678</p></div>
            <div>© 2025 — Fast delivery across Kenya</div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
